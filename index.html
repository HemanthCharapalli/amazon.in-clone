  background: transparent;
  color: #fff;
  border-radius: 6px;
  font-size: calc(var(--font-scale, 1) * 14px);
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  position: absolute;
  z-index: 12;
  transform: translateX(-50%);
}

.tooltip-box--show {
  opacity: 1;
  pointer-events: auto;
  animation: tooltipBounceIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

.tooltip-box--hide {
  opacity: 0;
  pointer-events: none;
  animation: tooltipFadeOut 0.25s ease-out;
}

@keyframes tooltipBounceIn {
  0% {
    opacity: 0;
    transform: translateX(-50%) translateY(-10px) scale(0.8);
  }

  60% {
    transform: translateX(-50%) translateY(0) scale(1.05);
  }

  100% {
    opacity: 1;
    transform: translateX(-50%) translateY(0) scale(1);
  }
}

@keyframes tooltipFadeOut {
  0% {
    opacity: 1;
    transform: translateX(-50%) translateY(0) scale(1);
  }

  100% {
    opacity: 0;
    transform: translateX(-50%) translateY(-10px) scale(0.8);
  }
}

/* Tnc Check box css */

.tncCheckbox {
  padding-top: 10px;
}

.tncCheckbox input[type='checkbox'] {
  display: none;
  cursor: pointer;
}

.tncCheckbox input[type='checkbox'] + label {
  display: flex;
  cursor: pointer;
  align-items: flex-start;
}

.tncCheckbox label::before {
  content: '\2713';
  border: 1px solid #979797;
  -webkit-border-radius: 2px;
  -moz-border-radius: 2px;
  border-radius: 2px;
  display: inline-block;
  width: 20px;
  height: 15px;
  color: transparent;
  -webkit-transition: 0.2s;
  -o-transition: 0.2s;
  -moz-transition: 0.2s;
  transition: 0.2s;
  margin-right: 7px;
  margin-top: 2px;
}

.tncCheckbox input[type='checkbox']:checked + label::before {
  background-color: var(--color-primary, #008cff);
  border-color: var(--color-primary, #008cff);
  color: #fff;
  line-height: 18px;
}

/* TNC check box css end */

/* -- Sticky Scroll -- */

@media only screen and (min-width: 1300px) and (max-width: 2000px) {
  .stickyScroll {
    width: 50px;
    border-radius: 0 8px 8px 0;
    box-shadow: 0 1px 30px 0 rgb(0 0 0 / 10%);
    background-color: #ffffff;
    position: fixed;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    z-index: 15;
  }

  .stickyScroll li {
    width: 100%;
    height: 50px;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .stickyScroll li:hover {
    background: #eaf5ff;
  }

  .tip {
    display: none;
  }

  .stickyScroll li:hover .tip {
    display: block;
    justify-content: center;
    position: absolute;
    top: 0;
    left: 60px;
    padding: 10px;
    width: 220px;
    background: #219393;
    border-radius: 4px;
    z-index: 15;
  }

  .tip::after {
    right: 100%;
    top: 50%;
    border: solid transparent;
    content: ' ';
    height: 0;
    width: 0;
    position: absolute;
    pointer-events: none;
    border-color: rgb(33 147 147 / 0%);
    border-right-color: #219393;
    border-width: 5px;
    margin-top: -5px;
  }

  .stickyScroll li:first-of-type {
    border-radius: 8px 8px 0 0;
  }

  .stickyScroll li:last-of-type {
    border-radius: 0 0 8px 8px;
  }

  .stickyScroll li a.active::before {
    width: 6px;
    height: 6px;
    background: var(--color-link-primary);
    border-radius: 100%;
    content: '';
    position: absolute;
    top: 10px;
    left: 10px;
  }

  .stickyScroll li a.active ~ .tip {
    display: none;
  }

  ._MyBiz .stickyScroll li a.active::before {
    background: #ff664b;
  }
}

@media only screen and (min-width: 300px) and (max-width: 1299px) {
  .stickyScroll {
    display: none;
  }

  .stickyScroll li {
    display: none;
  }
}

/* -- Loading State -- */

.dlLoader * {
  animation: Gradient 3s ease infinite;
}

@-webkit-keyframes Gradient {
  0% {
    background-position: 0% 50%;
  }

  50% {
    background-position: 100% 50%;
  }

  100% {
    background-position: 0% 50%;
  }
}

@-moz-keyframes Gradient {
  0% {
    background-position: 0% 50%;
  }

  50% {
    background-position: 100% 50%;
  }

  100% {
    background-position: 0% 50%;
  }
}

@keyframes Gradient {
  0% {
    background-position: 0% 50%;
  }

  50% {
    background-position: 100% 50%;
  }

  100% {
    background-position: 0% 50%;
  }
}

/* appear - on page load */

.fade-appear {
  opacity: 0;
  z-index: 1;
}

.fade-appear.fade-appear-active {
  opacity: 1;
  transition: opacity 200ms linear;
}

/* enter */

.fade-enter {
  opacity: 0;
  z-index: 1;
}

.fade-enter.fade-enter-active {
  opacity: 1;
  transition: opacity 200ms linear 200ms;
}

/* exit */

.fade-exit {
  opacity: 1;
}

.fade-exit.fade-exit-active {
  opacity: 0;
  display: none;
  transition: opacity 200ms linear;
}

.fade-exit-done {
  opacity: 0;
  display: block;
}

/* slide enter */

.slide-enter {
  opacity: 0;
  transform: scale(0.97) translateY(5px);
  z-index: 1;
}

.slide-enter.slide-enter-active {
  opacity: 1;
  transform: scale(1) translateY(0);
  transition: opacity 3000ms linear 1000ms, transform 3000ms ease-in-out 1000ms;
}

/* slide exit */

.slide-exit {
  opacity: 1;
  transform: scale(1) translateY(0);
}

.slide-exit.slide-exit-active {
  opacity: 0;
  transform: scale(0.97) translateY(5px);
  transition: opacity 1500ms linear, transform 1500ms ease-out;
}

.slide-exit-done {
  opacity: 0;
}

.checkmark::after {
  /* Add another block-level blank space */
  content: '';
  display: block;

  /* Make it a small rectangle so the border will create an L-shape */
  width: 3px;
  height: 6px;

  /* Add a white border on the bottom and left, creating that 'L' */
  border: solid #fff;
  border-width: 0 1px 1px 0;

  /* Rotate the L 45 degrees to turn it into a checkmark */
  transform: rotate(45deg);
}

  filter: drop-shadow(0 0 30px rgba(81, 175, 230, 0.4));
}
.tp-dt-enhanced-input-box-wrapper {
  width: 100%;
  height: 100%;
  border: none;
  outline: none;
  background: var(--tp-dt-input-wrapper-bg);
  border-radius: 10px;
  display: flex;
}

.tp-dt-enhanced-input-box {
  font-size: 14px;
  font-weight: 500;
  color: var(--tp-dt-input-text-color);
  box-sizing: border-box;
  border: none;
  outline: none;
  width: 90%;
  border-top-left-radius: 10px;
  border-bottom-left-radius: 10px;
  background: transparent;
  resize: none;
  padding: 8px 12px;
  font-family: inherit;
  overflow: hidden;
  line-height: 1.5;
  max-height: 42px; /* 2 lines: 14px * 1.5 * 2 = 42px */
  transition: font-size 1s ease, max-height 1s ease;
}

.tp-dt-input-scaling-up .tp-dt-enhanced-input-box {
  font-size: 16px;
  max-height: 48px; /* 2 lines: 16px * 1.5 * 2 = 48px */
}

.tp-dt-enhanced-input-box::placeholder {
  color: var(--tp-dt-input-placeholder-color);
  font-weight: 400;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: normal;
  line-height: 1.3;
}

.tp-dt-enhanced-search-icon {
  height: 40px;
  width: 40px;
  margin-right: 10px;
  cursor: pointer;
  transition: height 1s ease, width 1s ease;
}

.tp-dt-input-scaling-up .tp-dt-enhanced-search-icon {
  height: 44px;
  width: 44px;
}
/* input box styles end */

/* bot avatar styles start */
.tp-dt-bot-avatar {
  width: 120px;
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 15px;
  position: relative;
}

.tp-dt-bot-avatar::after {
  content: "";
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  width: 60%;
  height: 15px;
  background: radial-gradient(
    ellipse at center,
    rgba(0, 0, 0, 0.2) 0%,
    rgba(0, 0, 0, 0.1) 40%,
    transparent 70%
  );
  border-radius: 50%;
  filter: blur(4px);
}

.tp-dt-bot-avatar-minimizing {
  animation: botAvatarMinimize 1s ease forwards;
}

@keyframes botAvatarMinimize {
  0% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  100% {
    opacity: 0;
    transform: translateY(-10px) scale(0.5);
  }
}

.tp-dt-bot-static-image {
  width: 150px;
  height: 150px;
  object-fit: contain;
}

.tp-dt-bot-animated-image {
  width: 150px !important;
  height: 150px !important;
  object-fit: contain;
}
/* bot avatar styles end */

/* greeting message styles start */
.tp-dt-greeting-message {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  transition: all 500ms ease-out; /* matches GREETING_ANIMATION_DURATION */
  opacity: 1;
  transform: translateY(0);
  margin-top: 30%;
}

.tp-dt-greeting-message--fade-out {
  opacity: 0;
  transform: translateY(-50px);
}

.tp-dt-greeting-text {
  font-size: 16px;
  color: var(--tp-dt-greeting-text-color);
  font-weight: 700;
}

.tp-dt-greeting-name {
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(
    158deg,
    var(--tp-dt-gradient-color-1) 31.4%,
    var(--tp-dt-gradient-color-2) 66.06%,
    var(--tp-dt-gradient-color-3) 77.82%
  );
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1.2;
  margin-top: -10px;
}
/* greeting message styles end */

/* chips styles start */
.tp-dt-chips-container {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  padding: 0 20px;
  margin-top: 30%;
}
.tp-dt-chip-wrapper {
  background: var(--tp-dt-chip-bg);
  border-radius: 16px;
  box-shadow: 0 2px 8px var(--tp-dt-chip-shadow);
  max-width: 75%;
  max-height: 58px;
  box-sizing: border-box;
  padding: 12px 16px;
  overflow: hidden;
}

.tp-dt-chip {
  font-size: 14px;
  line-height: 1.4;
  text-align: left;
  cursor: pointer;
  transition: all 0.3s ease;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.tp-dt-chip:hover {
  box-shadow: 0 4px 12px var(--tp-dt-chip-shadow-hover);
  transform: translateY(-2px);
}

/* First chip - no bottom-right border radius */
.tp-dt-chip--first {
  border-bottom-right-radius: 0;
  align-self: flex-end;
  margin-right: 25px;
  animation: slideFirstChip 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

@keyframes slideFirstChip {
  0% {
    opacity: 0;
    transform: translateX(120px) scale(0.7);
  }
  100% {
    opacity: 1;
    transform: translateX(0) scale(1);
  }
}

/* Move first chip up from 30% to higher position */
.tp-dt-chip--first-move-up {
  animation: moveFirstChipUp 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

@keyframes moveFirstChipUp {
  0% {
    transform: translateY(0);
  }
  100% {
    transform: translateY(-60px);
  }
}

/* Second chip - no bottom-left border radius */
.tp-dt-chip--second {
  border-bottom-left-radius: 0;
  align-self: flex-start;
  margin-left: 25px;
  text-align: left;
  animation: slideSecondChip 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

@keyframes slideSecondChip {
  0% {
    opacity: 0;
    transform: translateX(-120px) translateY(-30px) scale(0.7);
  }
  100% {
    opacity: 1;
    transform: translateX(0) translateY(-30px) scale(1);
  }
}

/* Move second chip up as well */
.tp-dt-chip--second-move-up {
  animation: moveSecondChipUp 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

@keyframes moveSecondChipUp {
  0% {
    transform: translateY(-30px);
  }
  100% {
    transform: translateY(-60px);
  }
}
/* chips styles end */

/* header styles start */
.tp-dt-header {
  width: 100%;
  height: 40px;
  border-radius: 10px;
  display: flex;
  padding: 10px 16px;
  box-sizing: border-box;
  padding-top: 10px;
  justify-content: space-between;
  margin-top: 5px;
  position: relative;
}
.tp-dt-header-icon {
  height: 28px;
  width: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--tp-icon-bg);
  cursor: pointer;
}
.tp-dt-header-icon img {
  height: 45%;
  width: 45%;
  object-fit: contain;
}

.tp-dt-bot-avatar-container {
  width: 174px;
  height: 174px;
  position: absolute;
  top: -90px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  pointer-events: none;
}
/* header styles end */

/* frame minimize icon styles start */
.tp-dt-enhanced-floating-cta-frame-minimize-icon {
  position: absolute;
  top: 10px;
  left: -50px;
  width: 32px;
  height: 32px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.tp-dt-enhanced-floating-cta-frame-minimize-icon img {
  height: 100%;
  width: 100%;
  object-fit: contain;
  border-radius: 50%;
}
/* frame minimize icon styles end */
